version: '3.8'

services:
  tor-guard-relay:
    image: r3bo0tbx1/onion-relay:latest
    container_name: tor-guard-relay
    restart: unless-stopped
    network_mode: host
    environment:
      TOR_RELAY_MODE: guard
      TOR_NICKNAME: MyGuardRelay
      TOR_CONTACT_INFO: "email:your-email[]example.com url:https://example.com proof:uri-familyid-ed25519 ciissversion:3"
      TOR_ORPORT: 9001
      TOR_DIRPORT: 0
      TOR_BANDWIDTH_RATE: "50 MBytes"
      TOR_BANDWIDTH_BURST: "100 MBytes"
      # Happy Family (Tor 0.4.9+) - generate with: docker exec tor-guard-relay gen-family MyRelays
      # TOR_FAMILY_ID: "YOUR_FAMILY_ID_HERE"
      # MyFamily (legacy, comma-separated fingerprints - keep during transition)
      # TOR_MY_FAMILY: "FINGERPRINT1,FINGERPRINT2"
    volumes:
      - tor-guard-data:/var/lib/tor
      - tor-guard-logs:/var/log/tor
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 10m
      timeout: 15s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tor-guard-data:
    driver: local
  tor-guard-logs:
    driver: local